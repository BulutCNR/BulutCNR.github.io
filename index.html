<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络安全 — Poster Series</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: #1c1c1c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }
 
  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.2;
  }
 
  .float-char {
    position: fixed;
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    opacity: 0.04;
    color: #f7f5f0;
    pointer-events: none;
    z-index: 1;
    user-select: none;
    animation: floatDrift linear infinite alternate;
  }
  @keyframes floatDrift {
    0%   { transform: translateY(0px) rotate(0deg); }
    100% { transform: translateY(-24px) rotate(1deg); }
  }
 
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 20px;
  }
 
  .label {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: #FFC719;
    opacity: 0.5;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
 
  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 50px;
    font-weight: 900;
    color: #ede9e0;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 6px;
  }
 
  .subtitle {
    font-size: 8px;
    letter-spacing: 0.3em;
    color: #383838;
    margin-bottom: 50px;
    text-transform: uppercase;
  }
 
  .cards {
    display: flex;
    gap: 28px;
    justify-content: center;
    flex-wrap: wrap;
  }
 
  .card {
    width: 215px;
    border: 1px solid #2a2a2a;
    padding: 30px 22px 22px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.35s;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card.light { background: #f7f5f0; }
  .card.light::before { background: rgba(255,199,25,0.05); }
  .card.light .card-mode { color: #111; }
  .card.light .card-label { color: #bbb; }
  .card.light .card-bar { background: #111; }
  .card.light .card-dot { background: #FFC719; }
 
  .card.dark { background: #111; }
  .card.dark::before { background: rgba(255,199,25,0.04); }
  .card.dark .card-mode { color: #e8e5de; }
  .card.dark .card-label { color: #383838; }
  .card.dark .card-bar { background: #e8e5de; }
  .card.dark .card-dot { background: #FFC719; }
 
  .card:hover { border-color: rgba(255,199,25,0.45); transform: translateY(-6px); }
  .card:hover::before { opacity: 1; }
 
  .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #FFC719, transparent);
    opacity: 0.4;
  }
 
  .icon-wrap {
    width: 120px;
    height: 120px;
    margin: 0 auto 22px;
  }
  .icon-wrap svg {
    width: 100%;
    height: 100%;
    transition: transform 0.5s ease;
  }
  .card:hover .icon-wrap svg { transform: rotate(6deg) scale(1.05); }
 
  .card-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    margin: 0 auto 9px;
    animation: pdot 2s ease-in-out infinite;
  }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.15} }
 
  .card-mode {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .card-label {
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
 
  .card-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 1px;
    width: 0;
    transition: width 0.35s;
    opacity: 0.2;
  }
  .card:hover .card-bar { width: 100%; }
 
  .footer {
    margin-top: 46px;
    font-size: 8px;
    letter-spacing: 0.22em;
    color: #2c2c2c;
    text-transform: uppercase;
  }
</style>
</head>
<body>
 
<canvas id="bg"></canvas>
 
<div class="float-char" style="font-size:300px;top:2%;left:-5%;animation-duration:20s;">龙</div>
<div class="float-char" style="font-size:200px;bottom:6%;right:-2%;animation-duration:24s;animation-delay:-10s;">鸟</div>
<div class="float-char" style="font-size:130px;top:38%;right:7%;animation-duration:16s;animation-delay:-5s;">安</div>
 
<div class="container">
  <div class="label">网络安全服务 · Poster Series</div>
  <div class="title">上网，我们帮助</div>
  <div class="subtitle">Select a version</div>
 
  <div class="cards">
 
    <!-- LIGHT — bagua / sun graphic -->
    <a class="card light" href="poster_light.html">
      <div class="card-accent"></div>
      <div class="icon-wrap">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer ring -->
          <circle cx="60" cy="60" r="50" stroke="#111" stroke-width="1.2" opacity="0.12"/>
          <!-- middle ring -->
          <circle cx="60" cy="60" r="36" stroke="#111" stroke-width="1" opacity="0.18"/>
          <!-- inner circle -->
          <circle cx="60" cy="60" r="16" stroke="#111" stroke-width="1.2" fill="rgba(255,199,25,0.1)"/>
          <circle cx="60" cy="60" r="4" fill="#FFC719" opacity="0.9"/>
 
          <!-- 8 spokes — bagua inspired -->
          <line x1="60" y1="10" x2="60" y2="24" stroke="#111" stroke-width="1.4"/>
          <line x1="60" y1="96" x2="60" y2="110" stroke="#111" stroke-width="1.4"/>
          <line x1="10" y1="60" x2="24" y2="60" stroke="#111" stroke-width="1.4"/>
          <line x1="96" y1="60" x2="110" y2="60" stroke="#111" stroke-width="1.4"/>
          <line x1="25" y1="25" x2="35" y2="35" stroke="#111" stroke-width="1.4"/>
          <line x1="85" y1="85" x2="95" y2="95" stroke="#111" stroke-width="1.4"/>
          <line x1="95" y1="25" x2="85" y2="35" stroke="#111" stroke-width="1.4"/>
          <line x1="25" y1="95" x2="35" y2="85" stroke="#111" stroke-width="1.4"/>
 
          <!-- trigram dashes at 8 positions (bagua style) -->
          <!-- N -->
          <line x1="52" y1="13" x2="56" y2="13" stroke="#111" stroke-width="1.5"/>
          <line x1="58" y1="13" x2="62" y2="13" stroke="#111" stroke-width="1.5"/>
          <line x1="66" y1="13" x2="68" y2="13" stroke="#111" stroke-width="1.5"/>
          <!-- S -->
          <line x1="52" y1="107" x2="56" y2="107" stroke="#111" stroke-width="1.5"/>
          <line x1="58" y1="107" x2="68" y2="107" stroke="#111" stroke-width="1.5"/>
          <!-- E -->
          <line x1="107" y1="56" x2="107" y2="60" stroke="#111" stroke-width="1.5"/>
          <line x1="107" y1="62" x2="107" y2="66" stroke="#111" stroke-width="1.5"/>
          <line x1="107" y1="52" x2="107" y2="54" stroke="#111" stroke-width="1.5"/>
          <!-- W -->
          <line x1="13" y1="54" x2="13" y2="68" stroke="#111" stroke-width="1.5"/>
          <line x1="13" y1="52" x2="13" y2="53" stroke="#111" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="card-dot"></div>
      <div class="card-mode">Light</div>
      <div class="card-label">明亮版本</div>
      <div class="card-bar"></div>
    </a>
 
    <!-- DARK — geometric diamond / seal graphic -->
    <a class="card dark" href="poster_dark.html">
      <div class="card-accent"></div>
      <div class="icon-wrap">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer square rotated 45° -->
          <rect x="60" y="8" width="73" height="73" rx="2"
                transform="rotate(45 60 60)"
                stroke="#e8e5de" stroke-width="1.1" opacity="0.15"/>
          <!-- mid diamond -->
          <polygon points="60,18 102,60 60,102 18,60"
                   stroke="#e8e5de" stroke-width="1.1" fill="none" opacity="0.25"/>
          <!-- inner diamond -->
          <polygon points="60,34 86,60 60,86 34,60"
                   stroke="#e8e5de" stroke-width="1.1" fill="rgba(255,199,25,0.06)"/>
          <!-- cross -->
          <line x1="60" y1="18" x2="60" y2="102" stroke="#e8e5de" stroke-width="0.6" opacity="0.15"/>
          <line x1="18" y1="60" x2="102" y2="60" stroke="#e8e5de" stroke-width="0.6" opacity="0.15"/>
          <!-- diagonals -->
          <line x1="28" y1="28" x2="92" y2="92" stroke="#e8e5de" stroke-width="0.5" opacity="0.1"/>
          <line x1="92" y1="28" x2="28" y2="92" stroke="#e8e5de" stroke-width="0.5" opacity="0.1"/>
          <!-- center -->
          <circle cx="60" cy="60" r="8" stroke="#FFC719" stroke-width="1.2" fill="rgba(255,199,25,0.08)"/>
          <circle cx="60" cy="60" r="3" fill="#FFC719" opacity="0.85"/>
          <!-- corner dots at diamond points -->
          <circle cx="60" cy="34" r="2" fill="#e8e5de" opacity="0.4"/>
          <circle cx="86" cy="60" r="2" fill="#e8e5de" opacity="0.4"/>
          <circle cx="60" cy="86" r="2" fill="#e8e5de" opacity="0.4"/>
          <circle cx="34" cy="60" r="2" fill="#e8e5de" opacity="0.4"/>
          <!-- gold accent arcs -->
          <path d="M60 52 A8 8 0 0 1 68 60" stroke="#FFC719" stroke-width="1.2" opacity="0.5"/>
          <path d="M60 68 A8 8 0 0 1 52 60" stroke="#FFC719" stroke-width="1.2" opacity="0.5"/>
        </svg>
      </div>
      <div class="card-dot"></div>
      <div class="card-mode">Dark</div>
      <div class="card-label">暗色版本</div>
      <div class="card-bar"></div>
    </a>
 
  </div>
 
  <div class="footer">© 2026 · 网络安全 · voor MKB</div>
</div>
 
<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
 
  const nodes = Array.from({length: 22}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.22,
    vy: (Math.random() - 0.5) * 0.22,
    r: Math.random() * 1.4 + 0.7
  }));
 
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if (d < 155) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(255,199,25,${0.07*(1-d/155)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
      ctx.beginPath();
      ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,199,25,0.28)';
      ctx.fill();
      nodes[i].x += nodes[i].vx;
      nodes[i].y += nodes[i].vy;
      if (nodes[i].x < 0 || nodes[i].x > canvas.width) nodes[i].vx *= -1;
      if (nodes[i].y < 0 || nodes[i].y > canvas.height) nodes[i].vy *= -1;
    }
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
